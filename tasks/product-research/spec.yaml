version: "2.0"
name: "product-research-positioning"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-07-research.git"
  branch: "main"
task_dir: "tasks/product-research"
executor: "claude"
deliverables:
  - path: "reports/product-positioning.md"
    verify: "test -s reports/product-positioning.md && grep -q \"修订\" reports/product-positioning.md && grep -q \"证据\" reports/product-positioning.md && grep -q \"参考\" reports/product-positioning.md && grep -q \"风险\" reports/product-positioning.md"
execution:
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_duration_min: 15
  max_nudge_count: 3
  max_consecutive_escalate: 2
