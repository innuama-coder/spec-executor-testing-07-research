version: "2.3"
name: "product-research-positioning"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-07-research.git"
  branch: "main"
task_dir: "tasks/product-research"
deliverables:
- path: "reports/product-positioning.md"
  verify: "test -s reports/product-positioning.md && grep -q \"修订\" reports/product-positioning.md
    && grep -q \"证据\" reports/product-positioning.md && grep -q \"参考\" reports/product-positioning.md
    && grep -q \"风险\" reports/product-positioning.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "product-research-agent"
    role: "完成产品定位研究报告，保证结论、证据、风险和参考来源完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-RESEARCH-001"
      source: "external-review"
      severity: "must"
      target: "reports/product-positioning.md"
      issue: "报告必须包含证据和风险章节。"
      expected_fix: "补齐证据、风险、参考来源，并保持修订记录。"
      acceptance: "grep -q \"证据\" reports/product-positioning.md && grep -q \"风险\"\
        \ reports/product-positioning.md"
verification:
  commands:
  - "test -s reports/product-positioning.md"
  - "grep -q \"修订\" reports/product-positioning.md"
  - "grep -q \"证据\" reports/product-positioning.md"
  - "grep -q \"参考\" reports/product-positioning.md"
  - "grep -q \"风险\" reports/product-positioning.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
